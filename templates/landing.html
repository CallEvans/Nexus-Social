<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Social — Find Your People</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="landing-page">
  <nav class="landing-nav">
    <div class="logo"><div class="logo-icon">✦</div><span class="logo-text">Nexus<em>Social</em></span></div>
    <div class="nav-links">
      <a href="/login" class="btn-ghost-nav">Sign In</a>
      <a href="/register" class="btn-primary-nav">Get Started ✦</a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-glow"></div>
    <div class="hero-grid"></div>
    <div class="hero-content">
      <div class="hero-badge">✦ Real connections. Real identity.</div>
      <h1 class="hero-title">Your world,<br><em>connected.</em></h1>
      <p class="hero-sub">Nexus Social is where real people build real friendships. Every member gets a unique Nexus ID — yours forever.</p>
      <div class="hero-cta">
        <a href="/register" class="cta-primary">Create Your Account ✦</a>
        <a href="/login" class="cta-secondary">I already have one</a>
      </div>
      <div class="hero-stats">
        <div class="hs"><span class="hs-n">2.4k+</span><span class="hs-l">Members</span></div>
        <div class="hs-div"></div>
        <div class="hs"><span class="hs-n">47</span><span class="hs-l">Countries</span></div>
        <div class="hs-div"></div>
        <div class="hs"><span class="hs-n">Real-time</span><span class="hs-l">Chat</span></div>
      </div>
    </div>
  </div>
  <script src="/static/js/landing.js"></script>
</body>
</html>

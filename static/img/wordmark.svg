<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6fff"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
    </linearGradient>
    <linearGradient id="textGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#eceeff"/>
      <stop offset="100%" style="stop-color:#b8b0ff"/>
    </linearGradient>
    <linearGradient id="textGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#7c6fff"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon box -->
  <rect x="0" y="8" width="48" height="48" rx="13" fill="url(#iconBg)"/>

  <!-- N in icon -->
  <rect x="11" y="17" width="6" height="30" rx="2" fill="white" opacity="0.95"/>
  <rect x="31" y="17" width="6" height="30" rx="2" fill="white" opacity="0.95"/>
  <polygon points="17,17 23,17 37,47 31,47" fill="white" opacity="0.95"/>

  <!-- Star -->
  <g transform="translate(37,10)" filter="url(#glow2)">
    <path d="M4,0 L5,3 L8,4 L5,5 L4,8 L3,5 L0,4 L3,3 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- Wordmark text using basic shapes since SVG text rendering varies -->
  <!-- "Nexus" -->
  <text x="62" y="42"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-weight="800"
    font-size="30"
    letter-spacing="-0.5"
    fill="url(#textGrad1)">Nexus</text>

  <!-- "Social" -->
  <text x="172" y="42"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-weight="800"
    font-size="30"
    letter-spacing="-0.5"
    fill="url(#textGrad2)">Social</text>
</svg>
